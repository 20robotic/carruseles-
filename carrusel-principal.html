<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:transparent;padding:10px 44px 20px;font-family:'Inter',sans-serif}
#wrap{max-width:1280px;margin:0 auto;position:relative}
h2{font-size:28px;font-weight:800;margin-bottom:30px;text-transform:uppercase;letter-spacing:-.02em;border-left:6px solid #ff6b00;padding-left:20px}
.cw{overflow:hidden;position:relative;border-radius:12px}
.ck{display:flex;gap:20px;transition:transform .4s ease;padding:10px 0}
.ck.nt{transition:none}
.pc{flex:0 0 calc(20% - 16px);min-width:220px;background:#fff;border-radius:12px;box-shadow:0 8px 20px rgba(0,0,0,.06);overflow:hidden;border:1px solid #eee;transition:transform .2s,box-shadow .2s;text-decoration:none;color:inherit;display:block}
.pc:hover{transform:translateY(-5px);box-shadow:0 16px 30px rgba(0,0,0,.1);border-color:#ff9900}
.ci{width:100%;aspect-ratio:1/1;background:#fafafa;display:flex;align-items:center;justify-content:center;border-bottom:1px solid #f0f0f0}
.ci img{width:100%;height:100%;object-fit:contain;padding:16px}
.cd{padding:16px}
.cn{font-size:16px;font-weight:700;margin-bottom:6px;line-height:1.3;text-transform:uppercase;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:42px}
.cp{font-size:18px;font-weight:800;color:#111;margin-bottom:6px}
.cr{display:flex;align-items:center;gap:6px}
.cs{display:flex;gap:2px}
.cs svg{width:16px;height:16px}
.rv{font-size:13px;font-weight:600;color:#444}
.rc{font-size:12px;color:#888}
.cb{position:absolute;top:50%;transform:translateY(-50%);width:44px;height:44px;border-radius:50%;background:white;border:1px solid #ddd;box-shadow:0 4px 12px rgba(0,0,0,.12);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;transition:all .2s}
.cb:hover{background:#ff9900;border-color:#ff9900}
.cb:hover svg{color:white}
.cb svg{width:22px;height:22px;color:#555}
.cb.lf{left:8px}
.cb.rg{right:8px}
@media(max-width:1024px){.pc{flex:0 0 calc(25% - 15px)}}
@media(max-width:800px){.pc{flex:0 0 calc(33.333% - 14px)}}
@media(max-width:600px){.pc{flex:0 0 calc(50% - 10px)}.cb.lf{left:4px}.cb.rg{right:4px}}
@media(max-width:420px){.pc{flex:0 0 100%}}
</style>
</head>
<body>
<div id="wrap">
  <h2>&#128218; 22 Libros físicos - Más populares</h2>
  <div class="cw">
    <button class="cb lf" id="pb" aria-label="Anterior"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg></button>
    <div class="ck" id="tk"></div>
    <button class="cb rg" id="nb" aria-label="Siguiente"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg></button>
  </div>
</div>
<script>
var P=[
  ["Gramatica 1 2026","https://tienda.kningles.com/pages/gramatica1","https://res.cloudinary.com/dkadthyok/image/upload/v1772226317/grabd_zfsvf2.jpg","$12.99",5.0,7],
  ["Restaurante 2026","https://tienda.kningles.com/pages/restaurante","https://res.cloudinary.com/dkadthyok/image/upload/v1772225931/gr_kixevj.jpg","$14.99",4.3,10],
  ["Libro Gratis","https://tienda.kningles.com/pages/libro-gratis","https://res.cloudinary.com/dkadthyok/image/upload/v1772296858/Edici%C3%B3n_2023_lgyioi.png","Gratis",0,0],
  ["Basico A2","https://tienda.kningles.com/pages/basicoa2","https://res.cloudinary.com/dkadthyok/image/upload/v1772164671/p_i9yh99.jpg","$9.99",4.0,5],
  ["Basico A1 2026","https://tienda.kningles.com/pages/basicoa1","https://res.cloudinary.com/dkadthyok/image/upload/v1772248574/ggf_xkrskw.jpg","$9.99",4.6,30],
  ["Conversacional 2026","https://tienda.kningles.com/pages/conver12026","https://res.cloudinary.com/dkadthyok/image/upload/v1772164984/gran_tvilnc.jpg","$16.99",4.7,25],
  ["Plomeria","https://tienda.kningles.com/pages/plomeria","https://res.cloudinary.com/dkadthyok/image/upload/v1772155861/a1_aaxxz6.jpg","$11.99",5.0,1],
  ["Enfermeria","https://tienda.kningles.com/pages/enfermeria","https://res.cloudinary.com/dkadthyok/image/upload/v1772153645/grnade22_nkc2nt.jpg","$13.99",5.0,4],
  ["Warehouse","https://tienda.kningles.com/pages/warehouse","https://res.cloudinary.com/dkadthyok/image/upload/v1772144337/1x_avnnhf.jpg","$10.99",5.0,7],
  ["Medio avanzado B1+","https://tienda.kningles.com/pages/medio-avanzado","https://res.cloudinary.com/dkadthyok/image/upload/v1772150797/2xxx_ru0nnw.jpg","$15.99",5.0,4],
  ["Basico ninos","https://tienda.kningles.com/pages/basiconinos","https://res.cloudinary.com/dkadthyok/image/upload/v1772232871/ChatGPTImageFeb27202602_50_32P_xxwmky.jpg","$8.99",4.1,6],
  ["Limpieza","https://tienda.kningles.com/pages/limpieza","https://res.cloudinary.com/dkadthyok/image/upload/v1772233621/trert_zmpsfa.jpg","$9.99",4.1,5],
  ["Dentista","https://tienda.kningles.com/pages/dentista","https://res.cloudinary.com/dkadthyok/image/upload/v1772246769/gb_nmmnf9.jpg","$26.99",0,0],
  ["Construccion 2026","https://tienda.kningles.com/pages/construccion26","https://res.cloudinary.com/dkadthyok/image/upload/v1772234442/222_cikevj.jpg","$18.99",5.0,3],
  ["Conversacional 2","https://tienda.kningles.com/pages/conversacional2","https://res.cloudinary.com/dkadthyok/image/upload/v1772234903/717Ub6UKY_L._SL1499__c4jijj.jpg","$16.99",5.0,1],
  ["Barberia","https://tienda.kningles.com/pages/barberia","https://res.cloudinary.com/dkadthyok/image/upload/v1772235954/hyrd_yimuuu.jpg","$12.99",5.0,2],
  ["B1 Intermedio","https://tienda.kningles.com/pages/b1-intermedio","https://res.cloudinary.com/dkadthyok/image/upload/v1772236891/71gwHhUryyL._SL1500__c7wvrj.jpg","$14.99",5.0,1],
  ["Gramatica 2","https://tienda.kningles.com/pages/gramatica2","https://res.cloudinary.com/dkadthyok/image/upload/v1772237712/14_hyqqm9.jpg","$7.00",0,0],
  ["Mecanica","https://tienda.kningles.com/pages/mecanica","https://res.cloudinary.com/dkadthyok/image/upload/v1772243539/71wUadwCvwL._SL1500__rjgp7n.jpg","$7.00",5.0,1],
  ["Electricidad","https://tienda.kningles.com/pages/electricidad","https://res.cloudinary.com/dkadthyok/image/upload/v1772244554/24147_n88m0w.jpg","$17.99",5.0,4],
  ["Ciudadania","https://tienda.kningles.com/pages/ciudadania26","https://res.cloudinary.com/dkadthyok/image/upload/v1772248066/juki_jx4xwv.jpg","$9.99",4.4,10],
  ["Jardineria","https://tienda.kningles.com/pages/jardineria","https://res.cloudinary.com/dkadthyok/image/upload/v1772236508/71alEkd-DQL._SL1500__cxxusi.jpg","$11.99",5.0,1]
];

function star(color){
  return '<svg viewBox="0 0 20 20" fill="'+color+'" width="16" height="16"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>';
}

function buildStars(r){
  if(!r){ var s=''; for(var i=0;i<5;i++) s+=star('#ddd'); return s; }
  var s='', f=Math.floor(r), h=(r%1>=0.5)?1:0, e=5-f-h;
  for(var i=0;i<f;i++) s+=star('#ff9900');
  if(h) s+='<svg viewBox="0 0 20 20" width="16" height="16"><defs><linearGradient id="hg"><stop offset="50%" stop-color="#ff9900"/><stop offset="50%" stop-color="#ddd"/></linearGradient></defs><path fill="url(#hg)" d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>';
  for(var i=0;i<e;i++) s+=star('#ddd');
  return s;
}

function mkCard(d){
  var a=document.createElement('a');
  a.href=d[1]; a.target="_top"; a.className='pc';
  var rv=d[4] ? d[4].toFixed(1) : 'Nuevo';
  var rc=d[5] ? '('+d[5]+' '+(d[5]===1?'resena':'resenas')+')' : '';
  a.innerHTML='<div class="ci"><img src="'+d[2]+'" alt="'+d[0]+'" loading="lazy"></div>'
    +'<div class="cd">'
    +'<div class="cn">'+d[0]+'</div>'
    +'<div class="cp">'+d[3]+'</div>'
    +'<div class="cr"><div class="cs">'+buildStars(d[4])+'</div>'
    +'<span class="rv">'+rv+'</span>'
    +'<span class="rc">'+rc+'</span>'
    +'</div></div>';
  return a;
}

var track=document.getElementById('tk');
var prev=document.getElementById('pb');
var next=document.getElementById('nb');
var all=P.concat(P).concat(P);
var off=P.length;

for(var i=0;i<all.length;i++) track.appendChild(mkCard(all[i]));

function cw(){
  var c=track.querySelector('.pc');
  return c ? c.offsetWidth+(parseInt(getComputedStyle(track).gap)||20) : 240;
}

function go(idx,ani){
  var x=-(idx*cw())+'px';
  if(!ani){ track.classList.add('nt'); track.style.transform='translateX('+x+')'; track.offsetHeight; track.classList.remove('nt'); }
  else track.style.transform='translateX('+x+')';
}

go(off,false);

function slide(d){ off+=d; go(off,true); }

track.addEventListener('transitionend',function(){
  var len=P.length;
  if(off>=len*2){ off-=len; go(off,false); }
  if(off<len){ off+=len; go(off,false); }
});

prev.addEventListener('click',function(){ slide(-1); });
next.addEventListener('click',function(){ slide(1); });
window.addEventListener('resize',function(){ go(off,false); sendH(); });

function sendH(){
  var el=document.getElementById('wrap');
  if(el) window.parent.postMessage({h:el.offsetHeight+30},'*');
}
window.addEventListener('load',function(){ setTimeout(sendH,600); });
sendH();
</script>
</body>
</html>
