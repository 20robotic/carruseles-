<!-- CARRUSEL MÁS LIBROS MÁS VOCABULARIO KNINGLÉS -->
<style>
*{box-sizing:border-box;margin:0;padding:0}
.carousel-container3{max-width:1280px;margin:0 auto;position:relative;font-family:'Inter',sans-serif}
.carousel-title3{font-size:28px;font-weight:800;margin-bottom:30px;text-transform:uppercase;letter-spacing:-.02em;border-left:6px solid #ff6b00;padding-left:20px}
.carousel-wrapper3{overflow:hidden;position:relative;border-radius:12px}
.carousel-track3{display:flex;gap:20px;transition:transform .4s ease;padding:10px 0}
.carousel-track3.no-transition{transition:none}
.product-card3{flex:0 0 calc(20% - 16px);min-width:220px;background:#fff;border-radius:12px;box-shadow:0 8px 20px rgba(0,0,0,.06);overflow:hidden;border:1px solid #eee;transition:transform .2s,box-shadow .2s;text-decoration:none;color:inherit;display:block}
.product-card3:hover{transform:translateY(-5px);box-shadow:0 16px 30px rgba(0,0,0,.1);border-color:#ff9900}
.card-image3{width:100%;aspect-ratio:1/1;background:#fafafa;display:flex;align-items:center;justify-content:center;border-bottom:1px solid #f0f0f0}
.card-image3 img{width:100%;height:100%;object-fit:contain;padding:16px}
.card-content3{padding:16px}
.card-title3{font-size:16px;font-weight:700;margin-bottom:6px;line-height:1.3;text-transform:uppercase;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:42px}
.card-price3{font-size:18px;font-weight:800;color:#111}
.carousel-btn3{position:absolute;top:50%;transform:translateY(-50%);width:44px;height:44px;border-radius:50%;background:white;border:1px solid #ddd;box-shadow:0 4px 12px rgba(0,0,0,.12);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;transition:all .2s}
.carousel-btn3:hover{background:#ff9900;border-color:#ff9900}
.carousel-btn3:hover svg{color:white}
.carousel-btn3 svg{width:22px;height:22px;color:#555}
.carousel-btn3.prev3{left:-22px}
.carousel-btn3.next3{right:-22px}
@media(max-width:1024px){.product-card3{flex:0 0 calc(25% - 15px)}}
@media(max-width:800px){.product-card3{flex:0 0 calc(33.333% - 14px)}}
@media(max-width:600px){.product-card3{flex:0 0 calc(50% - 10px)}.carousel-btn3.prev3{left:-12px}.carousel-btn3.next3{right:-12px}}
@media(max-width:420px){.product-card3{flex:0 0 100%}}
</style>

<div class="carousel-container3">
<h2 class="carousel-title3">📗 20 Libros adicionales </h2>
<div class="carousel-wrapper3">
<button class="carousel-btn3 prev3" id="prevBtn3" aria-label="Anterior">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
</button>
<div class="carousel-track3" id="carouselTrack3"></div>
<button class="carousel-btn3 next3" id="nextBtn3" aria-label="Siguiente">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
</button>
</div>
</div>

<script>
(function(){
const P=[
{n:"Costura",u:"https://tienda.kningles.com/products/costura",i:"https://res.cloudinary.com/dkadthyok/image/upload/v1772469127/g56_wmiheb.jpg",p:"$12.99"},
{n:"Negocios",u:"https://tienda.kningles.com/products/negocios",i:"https://res.cloudinary.com/dkadthyok/image/upload/v1772469126/y6r_wydkdi.jpg",p:"$17.99"},
{n:"Camioneros",u:"https://tienda.kningles.com/products/camioneros",i:"https://res.cloudinary.com/dkadthyok/image/upload/v1772469126/r6_qj0of5.jpg",p:"$15.99"},
{n:"Delivery",u:"https://tienda.kningles.com/products/2006-delivery",i:"https://res.cloudinary.com/dkadthyok/image/upload/v1772469127/tr4_rnuvjw.jpg",p:"$11.50"},
{n:"Viajes",u:"https://tienda.kningles.com/products/viajes",i:"https://res.cloudinary.com/dkadthyok/image/upload/v1772469129/r55_bi9skr.jpg",p:"$12.99"},
{n:"Real State",u:"https://tienda.kningles.com/products/real-state",i:"https://res.cloudinary.com/dkadthyok/image/upload/v1772469131/r5_aryh4n.jpg",p:"$18.99"},
{n:"Emprendimiento",u:"https://tienda.kningles.com/products/emprendimiento",i:"https://res.cloudinary.com/dkadthyok/image/upload/v1772469132/r4_hv2ohn.jpg",p:"$13.99"},
{n:"Carpintería",u:"https://tienda.kningles.com/products/carpinteria",i:"https://res.cloudinary.com/dkadthyok/image/upload/v1772469132/r3_vf5lge.jpg",p:"$15.99"},
{n:"Cafetería",u:"https://tienda.kningles.com/products/cafeteria",i:"https://res.cloudinary.com/dkadthyok/image/upload/v1772469134/e2_qgnw2j.jpg",p:"$13.99"},
{n:"Música",u:"https://tienda.kningles.com/products/musica",i:"https://res.cloudinary.com/dkadthyok/image/upload/v1772469140/e1_nmptqc.jpg",p:"$9.99"},
{n:"Embarazo",u:"https://tienda.kningles.com/products/embarazo",i:"https://res.cloudinary.com/dkadthyok/image/upload/v1772469133/e3_vvuqyp.jpg",p:"$12.99"},
{n:"Anatomía",u:"https://tienda.kningles.com/products/anatomia",i:"https://res.cloudinary.com/dkadthyok/image/upload/v1772469135/w23_wg9g9i.jpg",p:"$14.00"},
{n:"B2",u:"https://tienda.kningles.com/products/b2",i:"https://res.cloudinary.com/dkadthyok/image/upload/v1772469136/w4_krdmbs.jpg",p:"$12.99"},
{n:"Supermercado",u:"https://tienda.kningles.com/products/supermercado",i:"https://res.cloudinary.com/dkadthyok/image/upload/v1772469143/w3_yxenma.jpg",p:"$12.99"},
{n:"Tala",u:"https://tienda.kningles.com/products/tala",i:"https://res.cloudinary.com/dkadthyok/image/upload/v1772469141/w2_fm9udi.jpg",p:"$9.99"},
{n:"Política",u:"https://tienda.kningles.com/products/politica",i:"https://res.cloudinary.com/dkadthyok/image/upload/v1772469142/w1_t6vr4i.jpg",p:"$15.99"},
{n:"Au Pairs",u:"https://tienda.kningles.com/products/au-pairs",i:"https://res.cloudinary.com/dkadthyok/image/upload/v1772469142/q14_wfw6fn.jpg",p:"$15.99"},
{n:"Call Center",u:"https://tienda.kningles.com/products/call-center",i:"https://res.cloudinary.com/dkadthyok/image/upload/v1772469143/q13_c0p5eu.jpg",p:"$15.99"},
{n:"Pintura",u:"https://tienda.kningles.com/products/pintura",i:"https://res.cloudinary.com/dkadthyok/image/upload/v1772469144/q12_q60yvv.jpg",p:"$15.99"},
{n:"Estudiantes",u:"https://tienda.kningles.com/products/ninos-estudiantes",i:"https://res.cloudinary.com/dkadthyok/image/upload/v1772469145/q1_pgcnz8.jpg",p:"$13.95"}
];

function makeCard(p){
  const a=document.createElement('a');
  a.href=p.u;a.className='product-card3';
  a.innerHTML=`<div class="card-image3"><img src="${p.i}" alt="${p.n}" loading="lazy"></div><div class="card-content3"><div class="card-title3">${p.n}</div><div class="card-price3">${p.p}</div></div>`;
  return a;
}

const track=document.getElementById('carouselTrack3');
const prev=document.getElementById('prevBtn3');
const next=document.getElementById('nextBtn3');

function vis(){const w=window.innerWidth;return w<=420?1:w<=600?2:w<=800?3:w<=1024?4:5;}

const items=[...P,...P,...P];
let offset=P.length;
items.forEach(p=>track.appendChild(makeCard(p)));

function cardW(){const c=track.querySelector('.product-card3');if(!c)return 240;return c.offsetWidth+(parseInt(getComputedStyle(track).gap)||20);}

function go(idx,animate){
  if(!animate)track.classList.add('no-transition');
  track.style.transform=`translateX(-${idx*cardW()}px)`;
  if(!animate){track.offsetHeight;track.classList.remove('no-transition');}
}

go(offset,false);
function slide(dir){offset+=dir;go(offset,true);}

track.addEventListener('transitionend',()=>{
  const len=P.length;
  if(offset>=len*2){offset-=len;go(offset,false);}
  if(offset<len){offset+=len;go(offset,false);}
});

prev.addEventListener('click',()=>slide(-1));
next.addEventListener('click',()=>slide(1));
window.addEventListener('resize',()=>go(offset,false));
})();
</script>
