<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:transparent;padding:10px 44px 20px}
.cc4{max-width:1280px;margin:0 auto;position:relative;font-family:'Inter',sans-serif}
.ct4{font-size:28px;font-weight:800;margin-bottom:30px;text-transform:uppercase;letter-spacing:-.02em;border-left:6px solid #ff6b00;padding-left:20px}
.cw4{overflow:hidden;position:relative;border-radius:12px}
.ck4{display:flex;gap:20px;transition:transform .4s ease;padding:10px 0}
.ck4.nt{transition:none}
.pc4{flex:0 0 calc(20% - 16px);min-width:220px;background:#fff;border-radius:12px;box-shadow:0 8px 20px rgba(0,0,0,.06);overflow:hidden;border:1px solid #eee;transition:transform .2s,box-shadow .2s;text-decoration:none;color:inherit;display:block}
.pc4:hover{transform:translateY(-5px);box-shadow:0 16px 30px rgba(0,0,0,.1);border-color:#ff9900}
.pi4{width:100%;aspect-ratio:1/1;background:#fafafa;display:flex;align-items:center;justify-content:center;border-bottom:1px solid #f0f0f0}
.pi4 img{width:100%;height:100%;object-fit:contain;padding:16px}
.pd4{padding:16px}
.pn4{font-size:16px;font-weight:700;margin-bottom:6px;line-height:1.3;text-transform:uppercase;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:42px}
.pp4{font-size:18px;font-weight:800;color:#111}
.cb4{position:absolute;top:50%;transform:translateY(-50%);width:44px;height:44px;border-radius:50%;background:white;border:1px solid #ddd;box-shadow:0 4px 12px rgba(0,0,0,.12);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;transition:all .2s}
.cb4:hover{background:#ff9900;border-color:#ff9900}
.cb4:hover svg{color:white}
.cb4 svg{width:22px;height:22px;color:#555}
.cb4.lf{left:-22px}.cb4.rg{right:-22px}
@media(max-width:1024px){.pc4{flex:0 0 calc(25% - 15px)}}
@media(max-width:800px){.pc4{flex:0 0 calc(33.333% - 14px)}}
@media(max-width:600px){.pc4{flex:0 0 calc(50% - 10px)}.cb4.lf{left:-12px}.cb4.rg{right:-12px}}
@media(max-width:420px){.pc4{flex:0 0 100%}}
</style>
</head>
<body>
<div id="wrap">
<div class="cc4">
  <h2 class="ct4">📗 20 Libros adicionales</h2>
  <div class="cw4">
    <button class="cb4 lf" id="p4" aria-label="Anterior"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg></button>
    <div class="ck4" id="t4"></div>
    <button class="cb4 rg" id="n4" aria-label="Siguiente"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg></button>
  </div>
</div>
</div>
<script>
window.addEventListener('load',function(){
  var P=[
    {n:"Costura",u:"https://tienda.kningles.com/products/costura",i:"https://res.cloudinary.com/dkadthyok/image/upload/v1772469127/g56_wmiheb.jpg",p:"$12.99"},
    {n:"Negocios",u:"https://tienda.kningles.com/products/negocios",i:"https://res.cloudinary.com/dkadthyok/image/upload/v1772469126/y6r_wydkdi.jpg",p:"$17.99"},
    {n:"Camioneros",u:"https://tienda.kningles.com/products/camioneros",i:"https://res.cloudinary.com/dkadthyok/image/upload/v1772469126/r6_qj0of5.jpg",p:"$15.99"},
    {n:"Delivery",u:"https://tienda.kningles.com/products/2006-delivery",i:"https://res.cloudinary.com/dkadthyok/image/upload/v1772469127/tr4_rnuvjw.jpg",p:"$11.50"},
    {n:"Viajes",u:"https://tienda.kningles.com/products/viajes",i:"https://res.cloudinary.com/dkadthyok/image/upload/v1772469129/r55_bi9skr.jpg",p:"$12.99"},
    {n:"Real State",u:"https://tienda.kningles.com/products/real-state",i:"https://res.cloudinary.com/dkadthyok/image/upload/v1772469131/r5_aryh4n.jpg",p:"$18.99"},
    {n:"Emprendimiento",u:"https://tienda.kningles.com/products/emprendimiento",i:"https://res.cloudinary.com/dkadthyok/image/upload/v1772469132/r4_hv2ohn.jpg",p:"$13.99"},
    {n:"Carpintería",u:"https://tienda.kningles.com/products/carpinteria",i:"https://res.cloudinary.com/dkadthyok/image/upload/v1772469132/r3_vf5lge.jpg",p:"$15.99"},
    {n:"Cafetería",u:"https://tienda.kningles.com/products/cafeteria",i:"https://res.cloudinary.com/dkadthyok/image/upload/v1772469134/e2_qgnw2j.jpg",p:"$13.99"},
    {n:"Música",u:"https://tienda.kningles.com/products/musica",i:"https://res.cloudinary.com/dkadthyok/image/upload/v1772469140/e1_nmptqc.jpg",p:"$9.99"},
    {n:"Embarazo",u:"https://tienda.kningles.com/products/embarazo",i:"https://res.cloudinary.com/dkadthyok/image/upload/v1772469133/e3_vvuqyp.jpg",p:"$12.99"},
    {n:"Anatomía",u:"https://tienda.kningles.com/products/anatomia",i:"https://res.cloudinary.com/dkadthyok/image/upload/v1772469135/w23_wg9g9i.jpg",p:"$14.00"},
    {n:"B2",u:"https://tienda.kningles.com/products/b2",i:"https://res.cloudinary.com/dkadthyok/image/upload/v1772469136/w4_krdmbs.jpg",p:"$12.99"},
    {n:"Supermercado",u:"https://tienda.kningles.com/products/supermercado",i:"https://res.cloudinary.com/dkadthyok/image/upload/v1772469143/w3_yxenma.jpg",p:"$12.99"},
    {n:"Tala",u:"https://tienda.kningles.com/products/tala",i:"https://res.cloudinary.com/dkadthyok/image/upload/v1772469141/w2_fm9udi.jpg",p:"$9.99"},
    {n:"Política",u:"https://tienda.kningles.com/products/politica",i:"https://res.cloudinary.com/dkadthyok/image/upload/v1772469142/w1_t6vr4i.jpg",p:"$15.99"},
    {n:"Au Pairs",u:"https://tienda.kningles.com/products/au-pairs",i:"https://res.cloudinary.com/dkadthyok/image/upload/v1772469142/q14_wfw6fn.jpg",p:"$15.99"},
    {n:"Call Center",u:"https://tienda.kningles.com/products/call-center",i:"https://res.cloudinary.com/dkadthyok/image/upload/v1772469143/q13_c0p5eu.jpg",p:"$15.99"},
    {n:"Pintura",u:"https://tienda.kningles.com/products/pintura",i:"https://res.cloudinary.com/dkadthyok/image/upload/v1772469144/q12_q60yvv.jpg",p:"$15.99"},
    {n:"Estudiantes",u:"https://tienda.kningles.com/products/ninos-estudiantes",i:"https://res.cloudinary.com/dkadthyok/image/upload/v1772469145/q1_pgcnz8.jpg",p:"$13.95"}
  ];
  var track=document.getElementById('t4'),prev=document.getElementById('p4'),next=document.getElementById('n4');
  if(!track||!prev||!next)return;
  function mkCard(p){var a=document.createElement('a');a.href=p.u; a.target="_top";a.className='pc4';a.innerHTML='<div class="pi4"><img src="'+p.i+'" alt="'+p.n+'" loading="lazy"></div><div class="pd4"><div class="pn4">'+p.n+'</div><div class="pp4">'+p.p+'</div></div>';return a;}
  var items=P.concat(P).concat(P),off=P.length;
  items.forEach(function(p){track.appendChild(mkCard(p));});
  function cw(){var c=track.querySelector('.pc4');if(!c)return 240;return c.offsetWidth+(parseInt(getComputedStyle(track).gap)||20);}
  function go(idx,ani){if(!ani){track.classList.add('nt');track.style.transform='translateX(-'+(idx*cw())+'px)';track.offsetHeight;track.classList.remove('nt');}else{track.style.transform='translateX(-'+(idx*cw())+'px)';}}
  go(off,false);
  function slide(d){off+=d;go(off,true);}
  track.addEventListener('transitionend',function(){var len=P.length;if(off>=len*2){off-=len;go(off,false);}if(off<len){off+=len;go(off,false);}});
  prev.addEventListener('click',function(){slide(-1);});
  next.addEventListener('click',function(){slide(1);});
  window.addEventListener('resize',function(){go(off,false);sendH();});
  sendH();
});
function sendH(){var el=document.getElementById('wrap');if(!el)return;window.parent.postMessage({h:el.offsetHeight+30},'*');}
window.addEventListener('load',function(){setTimeout(sendH,600);});
</script>
</body>
</html>
